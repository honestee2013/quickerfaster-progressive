deployment:
  tasks:
    # === Paths & Setup ===
    - export COMPOSER_BIN=/home/quickerf/composer.phar
    - export REPOPATH=/home/quickerf/laravel_suites_repo/quickerfaster.com
    - export LARAVEL_APP_PATH=/home/quickerf/laravel_app          # <-- Your real Laravel root
    - export WEB_ROOT=/home/quickerf/public_html                  # <-- Apache serves this
    - export LOGDIR=/home/quickerf/deploy_logs
    - mkdir -p $LOGDIR
    - export LOGFILE=$LOGDIR/deploy_$(date +"%Y-%m-%d_%H-%M-%S").log

    - /bin/echo "===== Deployment started at $(date) =====" >> $LOGFILE

    # === Pull latest code ===
    # - /bin/echo "Pulling latest changes from GitHub..." >> $LOGFILE
    - /bin/echo "Resetting local repo to match origin/main..." >> $LOGFILE
    - cd $REPOPATH && /usr/bin/git fetch origin main >> $LOGFILE 2>&1
    - cd $REPOPATH && /usr/bin/git reset --hard origin/main >> $LOGFILE 2>&1



    # === Sync non-public files to laravel_app (preserve .env, storage, cache) ===
    # === Sync non-public files to laravel_app (without rsync) ===
    - /bin/echo "Syncing app files to $LARAVEL_APP_PATH (using cp)..." >> $LOGFILE

    # Create backup directory for protected items
    - mkdir -p /tmp/laravel_protected_$$

    # Move protected items to temporary location
    - /bin/sh -c 'if [ -f "$LARAVEL_APP_PATH/.env" ]; then mv "$LARAVEL_APP_PATH/.env" /tmp/laravel_protected_$$/; fi' >> $LOGFILE 2>&1
    - /bin/sh -c 'if [ -d "$LARAVEL_APP_PATH/storage" ]; then mv "$LARAVEL_APP_PATH/storage" /tmp/laravel_protected_$$/; fi' >> $LOGFILE 2>&1
    - /bin/sh -c 'if [ -d "$LARAVEL_APP_PATH/bootstrap/cache" ]; then mv "$LARAVEL_APP_PATH/bootstrap/cache" /tmp/laravel_protected_$$/; fi' >> $LOGFILE 2>&1

    # Remove all current app files (except hidden system files like .cpanel.yml if present)
    - /bin/sh -c 'cd "$LARAVEL_APP_PATH" && find . -maxdepth 1 ! -name "." ! -name ".." ! -name ".cpanel.yml" -exec rm -rf {} + 2>/dev/null || true' >> $LOGFILE 2>&1

    # Copy all new files (except .git, public, and protected items)
    - /bin/sh -c 'cd "$REPOPATH" && /bin/cp -a $(/bin/ls -A | grep -vE "^\.(git|env|cpanel\.yml)$|^public$") "$LARAVEL_APP_PATH/"' >> $LOGFILE 2>&1

    # Restore protected items
    - /bin/sh -c 'if [ -f /tmp/laravel_protected_$$/.env ]; then mv /tmp/laravel_protected_$$/.env "$LARAVEL_APP_PATH/"; fi' >> $LOGFILE 2>&1
    - /bin/sh -c 'if [ -d /tmp/laravel_protected_$$/storage ]; then mv /tmp/laravel_protected_$$/storage "$LARAVEL_APP_PATH/"; fi' >> $LOGFILE 2>&1
    - /bin/sh -c 'if [ -d /tmp/laravel_protected_$$/cache ]; then mv /tmp/laravel_protected_$$/cache "$LARAVEL_APP_PATH/bootstrap/"; fi' >> $LOGFILE 2>&1

    # Clean up temp
    - rm -rf /tmp/laravel_protected_$$






    # === Ensure storage & cache dirs exist and are writable ===
    - /bin/echo "Ensuring storage and cache directories exist..." >> $LOGFILE
    - mkdir -p $LARAVEL_APP_PATH/storage/framework/cache/data \
                 $LARAVEL_APP_PATH/storage/framework/sessions \
                 $LARAVEL_APP_PATH/storage/framework/views \
                 $LARAVEL_APP_PATH/bootstrap/cache \
                 $LARAVEL_APP_PATH/storage/logs >> $LOGFILE 2>&1

    - chmod -R 755 $LARAVEL_APP_PATH/storage $LARAVEL_APP_PATH/bootstrap/cache >> $LOGFILE 2>&1

    # === Install/Update Composer dependencies ===
    - /bin/echo "Checking/Installing Composer..." >> $LOGFILE
    - /bin/sh -c 'if [ ! -f "$COMPOSER_BIN" ]; then
        cd /home/quickerf &&
        /usr/bin/curl -sS https://getcomposer.org/installer -o composer-setup.php &&
        ea-php84 composer-setup.php --quiet &&
        rm composer-setup.php;
      fi'

    - /bin/echo "Installing PHP dependencies..." >> $LOGFILE
    - cd $LARAVEL_APP_PATH && ea-php84 $COMPOSER_BIN install --no-dev --no-scripts --optimize-autoloader --no-interaction >> $LOGFILE 2>&1

    # === Laravel Post-Deploy Tasks ===
    - /bin/echo "Running Laravel cache & discovery..." >> $LOGFILE
    - cd $LARAVEL_APP_PATH && ea-php84 artisan config:clear >> $LOGFILE 2>&1
    - cd $LARAVEL_APP_PATH && ea-php84 artisan cache:clear >> $LOGFILE 2>&1
    - cd $LARAVEL_APP_PATH && ea-php84 artisan package:discover --ansi >> $LOGFILE 2>&1
    - cd $LARAVEL_APP_PATH && ea-php84 artisan config:cache >> $LOGFILE 2>&1
    - cd $LARAVEL_APP_PATH && ea-php84 artisan view:cache >> $LOGFILE 2>&1

    # === Migrations & Seeding (only if needed—comment out later if not) ===
    - /bin/echo "Running migrations..." >> $LOGFILE
    - cd $LARAVEL_APP_PATH && ea-php84 artisan migrate --force >> $LOGFILE 2>&1

    - /bin/echo "Seeding database..." >> $LOGFILE
    - cd $LARAVEL_APP_PATH && ea-php84 artisan db:seed --force >> $LOGFILE 2>&1

    # === Optional: Compile assets (if using Vite or Mix) ===
    # Skip for now since Soft UI may ship pre-built assets.
    # If you later use `npm run build`, add this block:
    #
    # - /bin/echo "Building frontend assets..." >> $LOGFILE
    # - cd $LARAVEL_APP_PATH && /usr/bin/npm ci --silent >> $LOGFILE 2>&1
    # - cd $LARAVEL_APP_PATH && /usr/bin/npm run build >> $LOGFILE 2>&1
    #
    # BUT: shared hosting often lacks Node. So better build locally and commit `public/build/`.

    # === Final cleanup ===
    - cd $LARAVEL_APP_PATH && ea-php84 artisan optimize:clear >> $LOGFILE 2>&1

    - /bin/echo "===== Deployment finished at $(date) =====" >> $LOGFILE

    # Rotate logs
    - /bin/ls -1t $LOGDIR/deploy_*.log | /usr/bin/tail -n +6 | /bin/xargs -r /bin/rm --
